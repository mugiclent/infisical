name: Deploy Infisical

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="$HOME/katisha/infisical"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            # Clone on first deploy, pull on subsequent deploys
            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR"
              git pull origin main
            else
              mkdir -p "$HOME/katisha"
              git clone "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            # Write .env from GitHub secrets — secrets are the source of truth
            cat > .env <<ENVEOF
            ENCRYPTION_KEY=${{ secrets.INFISICAL_ENCRYPTION_KEY }}
            AUTH_SECRET=${{ secrets.INFISICAL_AUTH_SECRET }}
            DB_CONNECTION_URI=postgres://infisical:${{ secrets.INFISICAL_DB_PASSWORD }}@db:5432/infisical
            REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
            SITE_URL=https://vault.katisha.online
            NODE_ENV=production
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_FROM_ADDRESS=${{ secrets.SMTP_FROM_ADDRESS }}
            SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            ENVEOF

            # Ensure the infisical postgres user and database exist on the shared db.
            # Each command is idempotent — safe to run on every deploy.
            docker exec db psql -U bikaze -d katisha-db \
              -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'infisical') THEN CREATE USER infisical WITH PASSWORD '${{ secrets.INFISICAL_DB_PASSWORD }}'; ELSE ALTER USER infisical WITH PASSWORD '${{ secrets.INFISICAL_DB_PASSWORD }}'; END IF; END \$\$;"
            docker exec db psql -U bikaze -d postgres -tc \
              "SELECT 1 FROM pg_database WHERE datname = 'infisical'" \
              | grep -q 1 || docker exec db psql -U bikaze -d postgres \
              -c "CREATE DATABASE infisical OWNER infisical;"
            docker exec db psql -U bikaze -d postgres \
              -c "GRANT ALL PRIVILEGES ON DATABASE infisical TO infisical;"

            # Start infisical (runs migrations first via infisical-db-migration)
            docker compose up -d --pull always

            # Wait for healthy status
            echo "Waiting for infisical to be healthy..."
            for i in $(seq 1 60); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' infisical 2>/dev/null || echo "missing")
              [ "$STATUS" = "healthy" ] && break
              [ $i -eq 60 ] && echo "Timed out waiting for infisical" && exit 1
              sleep 5
            done

            echo "Infisical is up."
